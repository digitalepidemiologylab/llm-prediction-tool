name: CI

on:
  pull_request:
  push:
    branches:
    - main
    - '**/main'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set environment variables
      run: |
        cat << EOF >> .env.override
        ENVIRONMENT=test
        RAILS_ENV=test
        CI=true
        SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
        AR_ENC_PRIMARY_KEY=${{ secrets.AR_ENC_PRIMARY_KEY }}
        AR_ENC_DETERMINISTIC_KEY=${{ secrets.AR_ENC_DETERMINISTIC_KEY }}
        AR_ENC_KEY_DERIVATION_SALT=${{ secrets.AR_ENC_KEY_DERIVATION_SALT }}
        EOF

    - name: Set metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_IMAGE_URL }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker image and push it to GitHub Container Registry
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile.dev
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_IMAGE_URL }}:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_IMAGE_URL }}:buildcache,mode=max

    - name: Modify docker-compose.yml to use the cached image
      run: |
        yq 'del(.x-base.build) | .x-base.image = "${{ secrets.DOCKER_IMAGE_URL }}:${{ steps.meta.outputs.version }}"' docker-compose.yml -i

    - name: Rubocop
      run: docker compose run --rm app bundle exec rubocop

    - name: Erb-lint
      run: docker compose run --rm app bundle exec erb_lint --lint-all --enable-all-linters

    - name: Brakeman
      run: docker compose run --rm app bundle exec brakeman

    - name: Check translations
      run: docker compose run --rm app bundle exec i18n-tasks health

    - name: Specs
      run: docker compose run --rm app rails parallel:create parallel:load_schema parallel:spec
